approval_policy = "never"

# Sandbox / permissions
# - `sandbox_workspace_write.network_access` controls whether subprocesses can reach the internet at all.
# - `[permissions.network]` further constrains subprocess traffic via Codex's managed proxy.
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true

[permissions.network]
enabled = true
mode = "limited"
allowed_domains = [
  "api.github.com",
  "codeload.github.com",
  "files.pythonhosted.org",
  "github.com",
  "objects.githubusercontent.com",
  "pypi.org",
  "raw.githubusercontent.com",
  "registry.npmjs.org",
]

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.po]
description = "只负责需求澄清与产出 docs/prd、docs/api、docs/ui；不写实现代码。"
config_file = "../agents/po.toml"

[agents.qa]
description = "只负责测试策略与测试用例/测试代码（Red）；不写业务实现。"
config_file = "../agents/qa.toml"

[agents.implementer]
description = "只按既定 PRD/API 与测试去实现最小代码；不改测试语义/验收口径。"
config_file = "../agents/implementer.toml"

[agents.reviewer]
description = "只做代码审查与风险评估；不直接改代码，只输出问题清单与建议。"
config_file = "../agents/reviewer.toml"

[agents.verifier]
description = "只负责最终验证（全量测试/CI 等），产出放行/阻塞结论与复现信息；不写实现代码。"
config_file = "../agents/verifier.toml"
